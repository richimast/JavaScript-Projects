<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Basic JavaScript Project9_countdown_slideshow Assignment</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="CSS/main.css">
        
    </head>

    <body>
        <!--calling the countdown function-->
        <p>How many seconds would you like to set your alarm for?</p>
        <input type="number" id="seconds" value="" />
        <button onclick="countdown()" id="startBtn">Click Here</button>
        <p id="timer"></p>


        <!-- Slideshow container -->
         
<div class="slideshow-container">

  <!-- Full-width images with number and caption text -->
  <div class="mySlides fade">
    <div class="numbertext">1 / 5</div>
    <img src="./images/thumbnail/car1.jpg" style="width:100%">
    <div class="text">Slideshow One</div>
  </div>

  <div class="mySlides fade">
    <div class="numbertext">2 / 5</div>
    <img src="./images/thumbnail/car2.jpg" style="width:100%">
    <div class="text">Slideshow Two</div>
  </div>

  <div class="mySlides fade">
    <div class="numbertext">3 / 5</div>
    <img src="./images/thumbnail/car3.jpg" style="width:100%">
    <div class="text">Slideshow Three</div>
  </div>

  <div class="mySlides fade">
    <div class="numbertext">3 / 5</div>
    <img src="./images/thumbnail/car4.jpg" style="width:100%">
    <div class="text">Slideshow Four</div>
  </div>

  <div class="mySlides fade">
    <div class="numbertext">3 / 5</div>
    <img src="./images/thumbnail/car5.jpg" style="width:100%">
    <div class="text">Slideshow Five</div>
  </div>

  <!-- Next and previous buttons -->
  <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
  <a class="next" onclick="plusSlides(1)">&#10095;</a>
</div>
<br>

<!-- The dots/circles -->
<div style="text-align:center">
  <span class="dot" onclick="currentSlide(1)"></span>
  <span class="dot" onclick="currentSlide(2)"></span>
  <span class="dot" onclick="currentSlide(3)"></span>
  <span class="dot" onclick="currentSlide(4)"></span>
  <span class="dot" onclick="currentSlide(5)"></span>
</div>


       <script src="JS/main.js"></script>
    </body>
</html>
